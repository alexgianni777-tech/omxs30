name: 2 · Kör på begäran

on:
  workflow_dispatch:
    inputs:
      verktyg:
        description: 'Vilket vill du köra?'
        required: true
        default: 'omxs30-backtest.js'
        type: choice
        options:
          - omxs30-screener.js
          - omxs30-backtest.js
          - omxs30-evaluate.js

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Kör valt verktyg → Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node notify.js "${{ inputs.verktyg }}"
      - name: Spara loggen
        run: |
          git config user.name "omxs30-bot"
          git config user.email "actions@github.com"
          git add candidates-log.csv || true
          git commit -m "Logg $(date -u +%F)" || echo "Inget att committa"
          git push || echo "Inget att pusha"
